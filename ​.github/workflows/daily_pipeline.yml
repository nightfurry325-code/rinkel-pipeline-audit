name: Daily Rinkel Data Pipeline

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Data
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Core Engine Pipeline
        run: |
          python core_engine.py
    
      - name: Commit and Push Clean JSONL Changes
        run: |
         git config --global user.name "GitHub Actions Bot"
         git config --global user.email "actions@github.com"
         git add processed_calls.json
         git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated daily data pipeline update" && git push)


