name: Daily Rinkel Data Pipeline

on:
  schedule:
    # Mengatur jadwal otomatis berjalan setiap hari jam 23:00 UTC (Sekitar jam 12 malam waktu Madrid)
    - cron: '0 23 * * *'
  workflow_dispatch: # Tombol rahasia biar lu bisa ngetes jalanin manual dari web GitHub

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Data
      uses: actions/checkout@v3

    - name: Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-node-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Execute Core Engine Pipeline
      run: |
        python core_engine.py

    - name: Commit and Push Clean JSONL Changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add processed_calls.json calls_*.jsonl
        git commit -m "chore: automated daily data pipeline update [skip ci]" || echo "No changes to commit"
        git push
